services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workforce_execution_platform
    ports:
      - "5432:5432"
    volumes:
      - wfp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workforce_execution_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - wfp_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/workforce_execution_platform?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

  mobile-web:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
      args:
        EXPO_PUBLIC_API_URL: http://localhost:3001/api
    environment:
      EXPO_PUBLIC_API_URL: http://localhost:3001/api
      NODE_ENV: production
    ports:
      - "19006:19006"
    depends_on:
      - api

volumes:
  wfp_pgdata:
  wfp_redisdata:
